{{- $c := .Files.Get "files/policies/restrict-image-registries.yaml" }}
{{- $patched := regexReplaceAll "(?m)^([[:space:]]*)validationFailureAction:.*$" ($c | toString) (printf "${1}validationFailureAction: \"%s\"" .Values.validationFailureAction) }}
{{- $globalPattern := .Values.allowedRegistries }}
{{- if .Values.imageRegistries.global }}
{{- $globalPattern = join " | " .Values.imageRegistries.global }}
{{- end }}
{{- $containersPattern := $globalPattern }}
{{- if .Values.imageRegistries.containers }}
{{- $containersPattern = join " | " .Values.imageRegistries.containers }}
{{- end }}
{{- $initContainersPattern := $globalPattern }}
{{- if .Values.imageRegistries.initContainers }}
{{- $initContainersPattern = join " | " .Values.imageRegistries.initContainers }}
{{- end }}
{{- $ephemeralContainersPattern := $globalPattern }}
{{- if .Values.imageRegistries.ephemeralContainers }}
{{- $ephemeralContainersPattern = join " | " .Values.imageRegistries.ephemeralContainers }}
{{- end }}
{{- $patched = replace "__CONTAINERS_PATTERN__" $containersPattern $patched }}
{{- $patched = replace "__INIT_CONTAINERS_PATTERN__" $initContainersPattern $patched }}
{{- $patched = replace "__EPHEMERAL_CONTAINERS_PATTERN__" $ephemeralContainersPattern $patched }}
{{- $patched = replace "__GLOBAL_PATTERN__" $globalPattern $patched }}
{{ trim $patched }}
