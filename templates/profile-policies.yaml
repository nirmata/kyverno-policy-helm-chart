{{- if .Values.installProfilePolicies }}
{{- $profileFiles := .Files.Glob (printf "files/%s/*.yaml" .Values.policyProfile) }}
{{- $needSep := false }}
{{- range $path, $content := $profileFiles }}
{{- if $needSep }}
---
{{- end }}
{{- $needSep = true }}
{{- $policy := $content | toString }}
{{- $patched := regexReplaceAll "(?m)^([[:space:]]*)validationFailureAction:.*$" $policy (printf "${1}validationFailureAction: \"%s\"" $.Values.validationFailureAction) }}
{{ trim $patched }}
{{- end }}
{{- end }}
