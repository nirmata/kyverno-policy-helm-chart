{{- /*
  Load each policy YAML from files/, patch `validationFailureAction`, process templated values for specific files, and emit valid YAML.
*/ -}}

{{- $files := .Files.Glob "files/*.yaml" }}
{{- range $path, $content := $files }}
{{- $policy := $content | toString }}
{{- $patched := regexReplaceAll "(?m)^([[:space:]]*)validationFailureAction:.*$" $policy (printf "${1}validationFailureAction: \"%s\"" $.Values.validationFailureAction) }}

# Source: {{ $path }}
{{- if eq $path "files/restrict_image_registries.yaml" }}
{{- /* Process image registry configuration for restrict_image_registries.yaml */ -}}
{{- $globalPattern := "" }}
{{- if $.Values.imageRegistries.global }}
{{- $globalPattern = "" }}
{{- range $i, $registry := $.Values.imageRegistries.global }}
{{- if $i }}{{- $globalPattern = printf "%s | %s" $globalPattern $registry }}{{- else }}{{- $globalPattern = $registry }}{{- end }}
{{- end }}
{{- else }}
{{- $globalPattern = $.Values.allowedRegistries }}
{{- end }}

{{- $containersPattern := "" }}
{{- if $.Values.imageRegistries.containers }}
{{- $containersPattern = "" }}
{{- range $i, $registry := $.Values.imageRegistries.containers }}
{{- if $i }}{{- $containersPattern = printf "%s | %s" $containersPattern $registry }}{{- else }}{{- $containersPattern = $registry }}{{- end }}
{{- end }}
{{- else }}
{{- $containersPattern = $globalPattern }}
{{- end }}

{{- $initContainersPattern := "" }}
{{- if $.Values.imageRegistries.initContainers }}
{{- $initContainersPattern = "" }}
{{- range $i, $registry := $.Values.imageRegistries.initContainers }}
{{- if $i }}{{- $initContainersPattern = printf "%s | %s" $initContainersPattern $registry }}{{- else }}{{- $initContainersPattern = $registry }}{{- end }}
{{- end }}
{{- else }}
{{- $initContainersPattern = $globalPattern }}
{{- end }}

{{- $ephemeralContainersPattern := "" }}
{{- if $.Values.imageRegistries.ephemeralContainers }}
{{- $ephemeralContainersPattern = "" }}
{{- range $i, $registry := $.Values.imageRegistries.ephemeralContainers }}
{{- if $i }}{{- $ephemeralContainersPattern = printf "%s | %s" $ephemeralContainersPattern $registry }}{{- else }}{{- $ephemeralContainersPattern = $registry }}{{- end }}
{{- end }}
{{- else }}
{{- $ephemeralContainersPattern = $globalPattern }}
{{- end }}

{{- $patched = regexReplaceAll "\\{\\{ include \"imageRegistries\\.pattern\" \\(dict \"type\" \"containers\" \"values\" \\.Values\\) \\}\\}" $patched $containersPattern }}
{{- $patched = regexReplaceAll "\\{\\{ include \"imageRegistries\\.pattern\" \\(dict \"type\" \"initContainers\" \"values\" \\.Values\\) \\}\\}" $patched $initContainersPattern }}
{{- $patched = regexReplaceAll "\\{\\{ include \"imageRegistries\\.pattern\" \\(dict \"type\" \"ephemeralContainers\" \"values\" \\.Values\\) \\}\\}" $patched $ephemeralContainersPattern }}
{{- $patched = regexReplaceAll "\\{\\{ include \"imageRegistries\\.pattern\" \\(dict \"type\" \"global\" \"values\" \\.Values\\) \\}\\}" $patched $globalPattern }}

{{ $patched | nindent 0 }}
{{- else }}
{{- /* For other files, just use the patched content without templating */ -}}
{{ $patched | nindent 0 }}
{{- end }}
---
{{- end }}